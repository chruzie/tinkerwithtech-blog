name: Deploy to GCS

on:
  push:
    branches:
      - main

# Required for Workload Identity Federation (keyless GCP auth)
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        # Outputs to: out/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # HTML pages — no-cache so new deploys are reflected immediately
      - name: Upload HTML pages
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: out
          destination: ${{ vars.GCS_BUCKET_NAME }}
          parent: false
          glob: "**/*.html"
          headers: |-
            cache-control: no-cache, must-revalidate
            content-type: text/html; charset=utf-8

      # Hashed static assets (_next/static/) — immutable, 1 year TTL
      # Next.js content-hashes these filenames so stale cache is never an issue
      - name: Upload hashed static assets
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: out
          destination: ${{ vars.GCS_BUCKET_NAME }}
          parent: false
          glob: "_next/static/**"
          headers: |-
            cache-control: public, max-age=31536000, immutable

      # Everything else (fonts, images, favicon, etc.) — 1 hour TTL
      - name: Upload other assets
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: out
          destination: ${{ vars.GCS_BUCKET_NAME }}
          parent: false
          glob: "**/*.!(html)"
          headers: |-
            cache-control: public, max-age=3600
